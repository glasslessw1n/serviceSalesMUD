      next: intel_start

- id: equipment_parts_argument
  title: 「设备科：备件论证「
  speaker: 「孙科长「
  text: |
    你给孙科长详细解释了原厂备件和非原厂的差异：

    「直线加速器的关键部件，比如加速管、磁控管，「
    「非原厂备件在能量稳定性、安全阈值上都有差距。「

    「万一出了问题，病人的治疗计划全乱，还可能引发纠纷。「

    孙科长点了点头，脸色凝重：
    「这事我有数了。「
    「我会要求卓亚的人提供原厂证明，如果提供不了——「

    他没把话说完，但意思很明显。
  tags: [「设备科「, 「孙科长「, 「说服「]
