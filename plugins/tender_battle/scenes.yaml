      next: intel_start

- id: equipment_professional_tone
  title: 「设备科：专业姿态「
  speaker: 「孙科长「
  text: |
    孙科长沉默了一会儿。

    「你说得对，我们采购的首先要对设备负责。「
    他收起了之前的态度，「这样，卓亚那边我去问清楚。「
    「如果他们真的在备件上打了折扣，那合同肯定要重新谈。「

    「你们医科达的方案先做出来。「
    他说，「下一步，上会讨论。「
  tags: [「设备科「, 「孙科长「, 「专业「]
