    「我们卓亚就是想让利于客户，没有别的意思。「

    「是吗？「你不动声色，「那备件的事呢？「
    「你们给医院承诺的是原厂备件，实际上呢？「

    老张的笑容僵住了。

    「那个……是下面的工程师说的，我们总部不知道。「
    「但我可以保证，以后一定用原厂备件。「

