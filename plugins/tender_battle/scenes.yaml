    - text: 「先搜集卓亚情报，再做完整方案「
      next: intel_start

- id: equipment_solution_pending
  title: 「设备科：等待方案「
  speaker: 「孙科长「
  text: |
    「好，你们先把方案做出来。「
    孙科长递给你一张名片，「这是我们的采购需求模板，「
    「按这个格式做就行。「

    他补充道：「院里最近在查耗材和设备采购的合规性，「
    「你们的价格和服务方案要经得起审计。「

    「明白。「你收好名片，「孙科长，我们方案做好，第一时间给您。「
