      next: leadership_intro
    - text: 「先搜集卓亚情报，再做针对性方案「
      next: intel_start

- id: equipment_payment_terms
  title: 「设备科：付款方式「
  speaker: 「孙科长「
  text: |
    「付款周期？「孙科长来了兴趣。

    「如果我们能分期付——三年分六次，每次付三分之一，「
    「价格可以再降2个点。「

    孙科长算了算：「那就是年费63万，比原来降了2万。「
    「这个数字……我还是得请示一下钱副院长。「

    他看着你：「这样吧，你们先做一个完整的方案出来，「
    「包括SLA、付款方式、备件清单，我上报给院领导。「
  tags: [「设备科「, 「孙科长「, 「付款方式「]
  on_enter:
