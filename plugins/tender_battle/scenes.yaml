- id: equipment_final_sla
  title: 「设备科：SLA底线「
  speaker: 「孙科长「
  text: |
    「2小时响应？「孙科长有些为难。

    「卓亚给的是48小时，这个差距……「
    「你能保证医科达一定能做到？「

    你掏出了医科达官方的SLA协议模板：
    「2小时到场，4小时修复，7×24小时热线。「
    「超时按比例退还服务费，白纸黑字。「

    孙科长仔细看了一遍，终于点头：
    「好，这个可以写进合同。「
    「价格方面，我再去和钱副院长争取一下。「
  tags: [「设备科「, 「孙科长「, 「SLA「]
  on_enter:
    - effect: set_attr
      key: equipment_sla_confirmed
      value: true
  choices:
