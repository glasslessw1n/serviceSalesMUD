    医科达方案 vs 卓亚方案对比：

    | 项目 | 医科达 | 卓亚 |
    |------|--------|------|
    | 年费 | 62万 | 43万 |
    | 响应时间 | 2小时 | 48小时 |
    | 备件 | 原厂 | 部分非原厂 |
    | SLA | 合同保证 |口头承诺 |

    会上，陈主任明确支持医科达：
    「放疗科最怕停机，SLA是关键。「

    孙科长则有些为难：
    「价格差距确实不小，但备件品质也不能忽视。「

    钱副院长最后的发言是：
    「今天不定论，大家再考虑考虑。「

    会后，你收到消息：卓亚知道评审结果后，紧急降价！
