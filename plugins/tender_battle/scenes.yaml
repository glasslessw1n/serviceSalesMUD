    年费32万，三年绑签，再送一年服务。

    这个价格已经低于医科达的成本线。
    医院无法拒绝这样的价格。

    钱副院长：
    「对不起，我们也要过日子。「

    你输了，而且输得很彻底。
    价格战从来不是医科达的战场。
    但这次失利，也让你更加清楚：
    医科达的价值，不在于低价，而在于不可替代的服务品质。
