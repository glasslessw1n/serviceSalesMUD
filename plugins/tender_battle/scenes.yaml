      next: equipment_intro
    - text: 「先搜集卓亚情报，知己知彼「
      next: intel_start

- id: oncology_quality_argument
  title: 「放疗科：质量论争「
  speaker: 「陈主任「
  text: |
    「非原厂备件？「陈主任脸色变了。

    「这个我还真不知道。「
    「老张——「他指的是卓亚的销售——「可没跟我说过这事。「

    你掏出了医科达的官方备件清单，和网上搜到的一些资料。
    卓亚的部分备件确实来自第三方，质量和原厂有差距。

    「这事我得重新考虑考虑了。「
    陈主任表情凝重，「你们医科达有没有什么官方说明？「
  tags: [「放疗科「, 「陈主任「, 「竞品弱点「]
  on_enter:
    - effect: set_attr
      key: oncology_concern_quality
      value: true
  choices:
    - text: 「「这是我们的官方备件保证函，我给您一份「「
      next: oncology_support_confirmed
    - text: 「「具体细节我可以安排医科达工程师来给您解释「「
      next: oncology_engineer_arrange

- id: oncology_support_confirmed
  title: 「放疗科：支持确认「
  speaker: 「陈主任「
  text: |
    陈主任接过保证函，仔细看了一遍。

    「好，我心中有数了。「
    「你们赶紧做个方案出来，我这边会支持的。「

    他送你到门口，补充了一句：
    「但最终还是要过孙科长那一关。他最近和卓亚的人走得很近。「
