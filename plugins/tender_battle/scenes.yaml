- id: contract_start
  title: 「危机初现「
  speaker: 「系统「
  text: |
    东州市人民医院放疗中心。

    直线加速器：医科达 Versa HD，2019年装机。
    当前维保：卓亚医疗，合同3个月后到期。

    你的手机上躺着一条消息：
    「听说卓亚已经在和陈主任接触了。「——某业内朋友

    这台 Versa HD 当年是你跟的，现在维保合同也要你来守。

    客户关系现状：
    · 陈主任（放疗科）：态度中立，临床出身，关心设备稳定性
    · 孙科长（设备科）：态度友善，关注价格和服务条款
    · 钱副院长：即将退休，不愿担责，关键拍板人

    合同到期前，你只有3个月时间。
  tags: [「开场「, 「维保合同「]
  choices:
    - text: 「先去拜访陈主任，了解放疗科的想法「
      next: oncology_intro
    - text: 「先去拜访孙科长，摸摸合同条款的底「
      next: equipment_intro
    - text: 「先搜集卓亚情报，知己知彼「
      next: intel_start

- id: oncology_intro
  title: 「放疗科：初次拜访「
  speaker: 「陈主任「
  text: |
    东州市人民医院放疗科，陈主任办公室。

    「小李啊，来了坐。「陈主任招呼你坐下。

    他在放疗科干了二十年，临床出身，对设备故障特别敏感。
    去年有一次加速器故障，卓亚的人修了8个小时，病人治疗被迫中断。

    「你们医科达响应是快，但价格也是真的贵。「
    他直截了当，「卓亚现在给我们报的价比你们便宜一半，备件也说没问题。「

    他顿了顿，「说实话，设备用了五年了，能省就省吧。「
  tags: [「放疗科「, 「陈主任「]
  choices:
    - text: 「向陈主任了解他对卓亚的具体担忧「
      next: oncology_concern
    - text: 「向陈主任展示医科达的技术优势「
      next: oncology_quality_argument

- id: oncology_concern
  title: 「放疗科：卓亚的隐患「
  speaker: 「陈主任「
  text: |
    「担忧？「陈主任苦笑。

    「去年有一次，我正在给病人做治疗，突然报警，开不了机。「
    他回忆，「卓亚的人来了，说要换某个部件，结果从上海调货，折腾了8个小时。「

    「那天我只能跟病人说设备维护，要改治疗计划。「
    「放疗的节奏一乱，病人和家属都有意见。「

    他压低声音：「我听说，他们有些备件不是原厂的。
    万一哪天出了大问题，谁负责？「

    他看着你：「你们医科达能在多长时间到？「
  tags: [「放疗科「, 「陈主任「, 「竞品弱点「]
  choices:
    - text: 「「我们2小时到场，4小时修复，否则按比例退还服务费「「
      next: oncology_sla_commit
    - text: 「「原厂备件是底线，卓亚那套有风险「「
      next: oncology_quality_argument

- id: oncology_sla_commit
  title: 「放疗科：SLA承诺「
  speaker: 「陈主任「
  text: |
    「2小时到场？「陈主任眉毛一挑。

    「这个数字能写进合同吗？「

    你当场拨打了医科达售后服务热线，确认了东州市的工程师排班：
    工作日：2小时到场
    夜间/节假日：4小时到场

    陈主任点了点头：「这个比卓亚强。「
    「但价格呢？你们比卓亚贵多少？「
  tags: [「放疗科「, 「陈主任「, 「SLA「]
  choices:
    - text: 「「贵有贵的道理，设备稳定性就是生产力「「
      next: oncology_value_argument
    - text: 「「价格可以谈，但SLA必须写进合同「「
      next: oncology_price_hint

- id: oncology_value_argument
  title: 「放疗科：价值论述「
  speaker: 「陈主任「
  text: |
    「一台直线加速器，一天做20个病人，一个病人收费约1500元。「
    你开始算账。

    「停机一天，就是3万块的收入损失，还不算纠纷。「
    「卓亚便宜，但他们备件来货慢。8小时那次的损失，够付好几年服务费差价了。「

    陈主任沉思了一会儿。

    「你说得有道理。「他终于开口。
    「但最终拍板不在我这里——设备科和院领导说了算。「
    「这样吧，我去跟孙科长打个招呼，你们先把服务方案做出来。「
  tags: [「放疗科「, 「陈主任「, 「说服「]
  on_enter:
    - effect: set_attr
      key: oncology_support
      value: true
  choices:
    - text: 「继续拜访孙科长，推进设备科线「
      next: equipment_intro
    - text: 「先搜集卓亚情报，再制定针对性方案「
      next: intel_start

- id: oncology_price_hint
  title: 「放疗科：价格松口「
  speaker: 「陈主任「
  text: |
    「价格可以谈？「陈主任来了兴趣。

    「这样，你们先把方案做出来，报个价。「
    「如果价格差距不大，我可以帮你们在院里说说好话。「

    他顿了顿：「但我有个条件——SLA必须白纸黑字写清楚。「
    「我不想再经历一次8小时。「

    你把这个承诺记在心里。
  tags: [「放疗科「, 「陈主任「, 「价格「]
  on_enter:
    - effect: set_attr
      key: oncology_price_interest
      value: true
  choices:
