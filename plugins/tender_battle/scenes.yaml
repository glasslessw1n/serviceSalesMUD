  speaker: 「钱副院长「
  text: |
    东州市人民医院行政楼，钱副院长办公室。

    钱副院长五十七岁，还有两年退休。
    他最近的心态是「平安着陆「——不想在最后阶段出任何岔子。

    「李经理，是吧？「他招呼你坐下，「你们医科达的设备我们用得不错。「

    「但是，「他话锋一转，「今年院里确实紧张。「
    「上面的政策你也知道，公立医院要控费。「
    「卓亚的报价比你们低那么多，这个账很难不算。「

    「你们有什么优势，能让我们多付这40%的钱？「
