- id: equipment_intro
  title: 「设备科：初次拜访「
  speaker: 「孙科长「
  text: |
    东州市人民医院设备科，孙科长办公室。

    孙科长干了十五年设备采购，老成持重。
    他和卓亚的销售老张关系不错——据说两人是同乡。

    「李经理，来坐。「他招呼你，「我知道你的来意。「
    「你们医科达的设备我们用了这么多年，服务确实没话说。「
    「但——「

    他话锋一转：
    「今年院里要过紧日子，预算压缩了30%。「
    「卓亚的报价比你们低40%，这个差距不小。「

    「你们有没有什么办法？「
  tags: [「设备科「, 「孙科长「, 「价格「]
  choices:
    - text: 「「价格可以谈，但服务条款不能打折「「
      next: equipment_price_talk
    - text: 「「孙科长，您对卓亚的续约条款了解多少？「「
      next: equipment_contract_review

- id: equipment_contract_review
  title: 「设备科：合同条款审查「
  speaker: 「孙科长「
  text: |
    「卓亚的合同？「孙科长愣了一下。

    「他们给的是三年合同，年均价格比你们低40%。「
    「条款方面——「他翻了翻文件夹，「响应时间48小时，比你们慢一些。「

    「备件呢？「你追问。

    孙科长沉默了片刻。
    「这个我没仔细看过。不过老张跟我说过，备件都是原厂品质。「

    「是吗？「你不动声色，「孙科长，我这边有一份医科达的官方备件说明，「
    「您看看，是否和卓亚给的那份一样？「
  tags: [「设备科「, 「孙科长「, 「合同条款「]
  on_enter:
    - effect: set_attr
      key: equipment_contract_reviewed
      value: true
  choices:
    - text: 「「我们可以提供原厂备件保证函「「
      next: equipment_original_parts
    - text: 「「48小时响应太慢了，临床等不起「「
      next: equipment_response_time

- id: equipment_price_talk
  title: 「设备科：价格谈判「
  speaker: 「孙科长「
  text: |
    「价格可以谈？「孙科长眼睛一亮。

    「那你们能降多少？「
    「卓亚给我们报的是年费48万，你们呢？「

    你心里快速盘算：医科达的标准报价是年费80万，
    但大客户可以谈到65万左右，条件是签三年。

    「如果我们签三年，年费可以降到65万。「
    你报了个数字，「而且SLA是2小时响应，原厂备件。「

    孙科长皱了皱眉：「65万还是比卓亚贵不少。「
    「你能不能再想想办法？「
  tags: [「设备科「, 「孙科长「, 「价格谈判「]
  choices:
    - text: 「「65万已经是我们的底线了，但服务品质完全不同「「
      next: equipment_value_push
    - text: 「「如果院里能保证付款周期，我们可以再优惠一些「「
      next: equipment_payment_terms

- id: equipment_original_parts
  title: 「设备科：原厂备件「
  speaker: 「孙科长「
  text: |
    孙科长接过你递来的备件清单，仔细看了一会儿。

    「等一下，「他脸色变了，「这个我得找卓亚的人确认一下。「

    他当场拨通了老张的电话，按了免提。
    「老张，你们的备件是原厂的吗？「

    电话那头沉默了两秒：「这个……大部分是原厂的，部分是国产替代，品质一样。「

    孙科长看了你一眼，脸色有些难看。
    「好，我知道了。「他挂断了电话。
  tags: [「设备科「, 「孙科长「, 「竞品弱点「]
  on_enter:
    - effect: set_attr
      key: equipment_zhuoya_weakness_known
      value: true
  choices:
    - text: 「「孙科长，原厂备件和非原厂的差异很大「「
      next: equipment_parts_argument
    - text: 「「这个您自己判断，我们医科达不会在备件上含糊「「
      next: equipment_professional_tone

- id: equipment_response_time
  title: 「设备科：响应时间「
  speaker: 「孙科长「
  text: |
    「48小时？「你皱了皱眉。

    「孙科长，东州市人民医院的放疗量一天多少台？「
    「停机一天，损失多少？「

    孙科长没说话，但显然在算账。

    「医科达的SLA是2小时响应，4小时修复。「
    你说，「48小时和2小时，差了24倍。「

    「这个……「孙科长明显被触动了，「你说的有道理。「
    「但价格差距确实太大了，我也不好向上面交代。「
  tags: [「设备科「, 「孙科长「, 「SLA「]
  choices:
    - text: 「「价格可以谈，但SLA必须保证2小时，这是医科达的底线「「
      next: equipment_final_sla
    - text: 「「孙科长，要不这样——您先看看我们的方案再决定？「「
      next: equipment_solution_pending

- id: equipment_value_push
  title: 「设备科：价值推动「
  speaker: 「孙科长「
  text: |
    「2小时响应和48小时响应，差了24倍的时间。「
    你说，「停机一天，损失多少？陈主任那边有多着急，您比我清楚。「

    孙科长沉默了一会儿。

    「好吧，我承认你们的服务确实更好。「
    「但这个价格，我需要向院领导汇报。「
    「你们能不能先做一个正式的方案出来？「

    他顿了顿：「还有，钱副院长那边，你们自己去攻关。「
    「他马上要退休了，不想担责任。「
  tags: [「设备科「, 「孙科长「, 「说服「]
  on_enter:
