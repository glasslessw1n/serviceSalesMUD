      next: intel_start

- id: oncology_engineer_arrange
  title: 「放疗科：安排工程师「
  speaker: 「陈主任「
  text: |
    「那行，安排一个工程师来给我讲讲也行。「
    陈主任点了点头。

    你当场联系了医科达驻东州市的资深工程师老赵，约定了下周二的回访。

    「好，那我等你们的消息。「
    陈主任送你出门，「记住，SLA要写清楚，这是我的底线。「
  tags: [「放疗科「, 「陈主任「, 「工程师「]
