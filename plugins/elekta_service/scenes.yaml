    「今年上面压了 15% 的设备预算，但我们放疗科的患者量涨了 20%。
    设备不能停，但钱要省着花。」

    他顿了顿：「还有一个问题——Varian 的 TrueBeam 报价比你们低 18%。
    我不是要压你价格，我只是需要知道医科达值多少。」

    这就是核心信息：预算敏感 + 质量不能降 + 已经有竞品压力。
